<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="root"></div>

    <script>
        Vue.createApp({
            data() {
                return {
                    content: 'hello world',
                    show: true
                }
            },
            methods: {
                handleBtnClick() {
                    this.content = this.content.split('').reverse().join('');
                },
                showBtnClick() {
                    this.show = !this.show;
                }
            },
            template: `
                <div>
                    <h1 v-if="show">{{content}}</h1>
                    <button v-on:click="handleBtnClick">反转</button>
                    <button v-on:click="showBtnClick">显示/隐藏</button>
                </div>
            `
        }).mount('#root');
    </script>
</body>

</html>
